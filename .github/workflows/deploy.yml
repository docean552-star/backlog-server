name: Deploy backlog-server

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  APP_NAME: backlog-server
  APP_PATH: /opt/backlog-server
  SERVER_HOST: 18.196.186.100
  SERVER_USER: deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o backlog-server ./cmd/backlog-server
          ls -lh backlog-server

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp backlog-server dist/

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz
          path: dist/
          remote_path: ${{ env.APP_PATH }}/
          remote_host: ${{ env.SERVER_HOST }}
          remote_user: ${{ env.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.APP_PATH }}
            chmod +x ./backlog-server
            sudo systemctl restart ${{ env.APP_NAME }}
            sleep 2
            sudo systemctl is-active ${{ env.APP_NAME }}
            echo "=== Deployed ==="
